[package]
name = "honeybeepf"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
honeybeepf-common = { path = "../honeybeepf-common", features = ["user"] }

# Inherit core dependencies
anyhow = { workspace = true, default-features = true }
aya = { workspace = true }
aya-log = { workspace = true }
aya-log-common = { workspace = true }
chrono = "0.4"

env_logger = { workspace = true }
libc = { workspace = true }
log = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "net", "signal"] }
clap = { workspace = true, features = ["derive", "env"] }

# Local dependencies
config = "0.14"
dotenvy = "0.15"
serde = { version = "1.0", features = ["derive"] }
bytes = "1"

# Observability - Strictly inherited from workspace root
tracing.workspace = true
tracing-subscriber.workspace = true
opentelemetry.workspace = true
opentelemetry-otlp.workspace = true
tracing-opentelemetry.workspace = true
opentelemetry_sdk.workspace = true

# prometheus
prometheus = "0.13"
axum = "0.7"

[dev-dependencies]
serial_test = "3.2.0"

[build-dependencies]
anyhow = { workspace = true }
aya-build = { workspace = true }
cargo_metadata = { workspace = true }
honeybeepf-ebpf = { path = "../honeybeepf-ebpf" }

[[bin]]
name = "honeybeepf"
path = "src/main.rs"